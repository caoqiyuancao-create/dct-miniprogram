<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>DCT 第三期 · 报名 设计稿 · 打印版</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700;900&family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:       #0b1f3a;
    --gold:      #e9b949;
    --mute:      #6b7a91;
  }
  html, body { margin: 0; padding: 0; background: #eceef2; color: var(--ink); font-family: "Noto Sans SC", -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif; }
  .serif { font-family: "Noto Serif SC", "STSong", serif; }
  .mono  { font-family: "JetBrains Mono", ui-monospace, monospace; }
  * { box-sizing: border-box; }

  /* Cover page — full bleed */
  .cover-page {
    background: linear-gradient(180deg, #eef4fb 0%, #d3e3f5 45%, #b7cfea 100%);
    min-height: 100vh;
    position: relative;
    overflow: hidden;
  }
  .cover-page::before {
    content: ''; position: absolute; inset: 0;
    background:
      radial-gradient(circle at 14% 110%, rgba(255,255,255,0.4) 0%, transparent 50%),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.18) 0 1px, transparent 1px 4px);
    pointer-events: none;
  }
  .cover-page > * { position: relative; z-index: 2; }

  /* Each section becomes a print page */
  .print-page {
    background: #fff;
    page-break-after: always;
    break-after: page;
    page-break-inside: avoid;
    break-inside: avoid;
    min-height: 100vh;
  }
  .print-page:last-child {
    page-break-after: auto;
    break-after: auto;
  }

  /* Animations off in print */
  @media print {
    @page          { size: A4 portrait; margin: 0; }
    @page landscape{ size: A4 landscape; margin: 0; }
    .print-page-landscape { page: landscape; }

    html, body { background: #fff !important; }
    .print-page {
      min-height: 0;
      page-break-after: always;
      break-after: page;
      page-break-inside: avoid;
    }
    *, *::before, *::after {
      animation: none !important;
      transition: none !important;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    /* Hide on-screen-only widgets that don't make sense in print */
    .print-page [data-print-hide] { display: none !important; }
  }

  ::-webkit-scrollbar { width: 0; height: 0; }
</style>
</head>
<body>
<div id="root"></div>

<script src="data/issues.js"></script>
<script type="text/babel" src="components/ios-frame.jsx"></script>
<script type="text/babel" src="src/poster-bg.jsx"></script>
<script type="text/babel" src="src/miniprogram-chrome.jsx"></script>
<script type="text/babel" src="src/screen-home.jsx"></script>
<script type="text/babel" src="src/screen-about.jsx"></script>
<script type="text/babel" src="src/screen-review.jsx"></script>
<script type="text/babel" src="src/screen-landing.jsx"></script>
<script type="text/babel" src="src/screen-form.jsx"></script>
<script type="text/babel" src="src/screen-success.jsx"></script>
<script type="text/babel" src="src/screen-detail.jsx"></script>
<script type="text/babel" src="src/screen-wall.jsx"></script>
<script type="text/babel" src="src/app-print.jsx"></script>

<!-- Auto-print after fonts + Babel are ready -->
<script type="text/babel">
  (async () => {
    try {
      if (document.fonts && document.fonts.ready) await document.fonts.ready;
    } catch (e) {}
    // Wait for React to commit, then a beat for layout
    await new Promise(r => setTimeout(r, 800));
    window.print();
  })();
</script>
</body>
</html>
